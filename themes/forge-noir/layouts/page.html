{{ define "content" }}
<section class="masthead masthead-page">
  <div class="kicker">Page</div>
  <h1>{{ .Page.Title }}</h1>
  {{ if .Page.Summary }}
  <p class="lede">{{ .Page.Summary }}</p>
  {{ end }}
</section>

<article class="article-shell panel article-panel">
  {{ pluginSlot "page.before_content" }}
  <div class="forge-prose">{{ safeHTML .Page.HTMLBody }}</div>
  {{ pluginSlot "page.after_content" }}
</article>
{{ end }}
