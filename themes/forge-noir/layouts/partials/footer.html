{{ define "footer" }}
<footer class="forge-footer">
  <div class="forge-footer-grid">
    <div class="footer-column">
      <div class="footer-heading">{{ .Site.Title }}</div>
      <p>
        Forge Noir is a premium dark Foundry theme for editorial sites that want more atmosphere,
        more hierarchy, and less commodity design.
      </p>
    </div>

    <div class="footer-column">
      <div class="footer-heading">Navigation</div>
      <div class="footer-links">
        {{ range .Nav }}
        <a href="{{ .URL }}">{{ .Name }}</a>
        {{ end }}
      </div>
    </div>

    <div class="footer-column">
      <div class="footer-heading">Feeds</div>
      <div class="footer-links">
        <a href="{{ .Site.Feed.RSSPath }}">RSS</a>
        <a href="{{ .Site.Feed.SitemapPath }}">Sitemap</a>
      </div>
    </div>
  </div>
</footer>
{{ end }}
