{{ define "base" }}
<!doctype html>
<html lang="{{ .Lang }}">
{{ template "head" . }}
<body>
  {{ pluginSlot "body.start" }}

<div class="site-shell">
    {{ template "header" . }}

    {{ pluginSlot "page.before_main" }}

    <main class="site-main">
        <div class="container">
            {{ template "content" . }}
        </div>
    </main>

    {{ pluginSlot "page.after_main" }}

    {{ template "footer" . }}
</div>

  {{ pluginSlot "body.end" }}

{{ if .LiveReload }}
<script>
    (() => {
        const es = new EventSource('/__reload');
        es.onmessage = () => window.location.reload();
    })();
</script>
{{ end }}

</body>
</html>
{{ end }}
