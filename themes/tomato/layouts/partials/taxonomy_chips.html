{{ define "taxonomy_chips" }} {{ with index .Page.Taxonomies "tags" }}
<section class="aside-card">
  <h3>Tags</h3>
  <div class="chip-row">
    {{ range . }}
    <a class="chip" href="/tags/{{ . }}/">{{ . }}</a>
    {{ end }}
  </div>
</section>
{{ end }} {{ with index .Page.Taxonomies "categories" }}
<section class="aside-card">
  <h3>Categories</h3>
  <div class="chip-row">
    {{ range . }}
    <a class="chip" href="/categories/{{ . }}/">{{ . }}</a>
    {{ end }}
  </div>
</section>
{{ end }} {{ end }}
