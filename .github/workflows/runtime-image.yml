name: Runtime Image Release

on:
  pull_request:
    branches: ["main"]
  push:
    tags: ["runtime-v*.*.*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build from for manual release or rollback"
        required: false
        default: main
      version:
        description: "Runtime image version, e.g. runtime-v1.3.2"
        required: false

permissions:
  contents: read
  packages: write

concurrency:
  group: runtime-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
      - run: go run ./cmd/plugin-sync
      - run: go test ./...

  publish:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
      - name: Determine image tag
        id: meta
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            IMAGE_TAG="${{ github.event.inputs.version }}"
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.ref }}" ]; then
            IMAGE_TAG="${{ github.event.inputs.ref }}"
          else
            IMAGE_TAG="${GITHUB_REF_NAME}"
          fi
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push runtime image
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          IMAGE_URI="ghcr.io/${GITHUB_REPOSITORY_OWNER}/foundry-runtime:${IMAGE_TAG}"
          docker build \
            --build-arg FOUNDRY_BUILD_VERSION="${IMAGE_TAG}" \
            --build-arg FOUNDRY_BUILD_COMMIT="${GITHUB_SHA}" \
            --build-arg FOUNDRY_BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t "${IMAGE_URI}" \
            -t "ghcr.io/${GITHUB_REPOSITORY_OWNER}/foundry-runtime:latest" \
            .
          docker push "${IMAGE_URI}"
          docker push "ghcr.io/${GITHUB_REPOSITORY_OWNER}/foundry-runtime:latest"
