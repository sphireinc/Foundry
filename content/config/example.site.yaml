name: "foundry"
title: "Foundry CMS"
base_url: ""
theme: "default"
environment: "default"
default_lang: "en"
content_dir: "content"
public_dir: "public"
themes_dir: "themes"
data_dir: "data"
plugins_dir: "plugins"

server:
  addr: ":8080"
  live_reload: false
  live_reload_mode: "stream"
  auto_open_browser: false
  debug_routes: false

admin:
  enabled: false
  addr: ""
  path: "/__admin"
  local_only: true
  access_token: ""
  session_secret: ""
  totp_secret_key: ""
  theme: "default"
  users_file: "content/config/admin-users.yaml"
  session_store_file: "data/admin/sessions.yaml"
  lock_file: "data/admin/locks.yaml"
  session_ttl_minutes: 30
  session_idle_timeout_minutes: 30
  session_max_age_minutes: 480
  single_session_per_user: false
  password_min_length: 12
  password_reset_ttl_minutes: 30
  totp_issuer: "Foundry"
  debug:
    pprof: false

build:
  clean_public_dir: false
  include_drafts: false
  minify_html: false
  copy_assets: false
  copy_images: false
  copy_uploads: false

content:
  pages_dir: "pages"
  posts_dir: "posts"
  images_dir: "images"
  videos_dir: "videos"
  audio_dir: "audio"
  documents_dir: "documents"
  assets_dir: "assets"
  uploads_dir: "uploads"
  max_versions_per_file: 10
  default_layout_page: "page"
  default_layout_post: "post"
  default_page_slug_index: "index"

permalinks:
  page_default: "/:slug/"
  page_i18n: "/:lang/:slug/"
  post_default: "/posts/:slug/"
  post_i18n: "/:lang/posts/:slug/"

taxonomies:
  enabled: false
  default_set:
    - tags
    - categories
  definitions: {}

plugins:
  enabled: []

seo:
  enabled: false
  default_title_sep: ""

cache:
  enabled: false

security:
  allow_unsafe_html: false

feed:
  rss_path: "/rss.xml"
  sitemap_path: "/sitemap.xml"
  rss_limit: 50
  rss_title: "Foundry CMS"
  rss_description: "Foundry CMS"

deploy:
  default_target: ""
  targets: {}

params: {}

menus: {}
