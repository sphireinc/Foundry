name: "foundry"
title: "Foundry CMS"
base_url: "http://localhost:8080"
theme: "default"
environment: "default"
default_lang: "en"
content_dir: "content"
public_dir: "public"
themes_dir: "themes"
data_dir: "data"
plugins_dir: "plugins"
server:
  addr: ":8080"
  live_reload: true
  live_reload_mode: "stream"
  auto_open_browser: false
  debug_routes: false
admin:
  enabled: true
  addr: ""
  path: "/__admin"
  local_only: true
  access_token: ""
  theme: default
  users_file: "content/config/admin-users.yaml"
  session_store_file: "data/admin/sessions.yaml"
  lock_file: "data/admin/locks.yaml"
  session_ttl_minutes: 30
  password_min_length: 12
  password_reset_ttl_minutes: 30
  totp_issuer: "Foundry"
  debug:
    pprof: true
build:
  clean_public_dir: true
  include_drafts: false
  minify_html: true
  copy_assets: true
  copy_images: true
  copy_uploads: true
content:
  pages_dir: "pages"
  posts_dir: "posts"
  images_dir: "images"
  videos_dir: "videos"
  audio_dir: "audio"
  documents_dir: "documents"
  assets_dir: "assets"
  uploads_dir: "uploads"
  max_versions_per_file: 10
  default_layout_page: "page"
  default_layout_post: "post"
  default_page_slug_index: "index"
permalinks:
  page_default: "/:slug/"
  page_i18n: "/:lang/:slug/"
  post_default: "/posts/:slug/"
  post_i18n: "/:lang/posts/:slug/"
taxonomies:
  enabled: true
  default_set:
    - tags
    - categories
  definitions:
    tags:
      title: Tags
      labels:
        en: Tags
        es: Etiquetas
      term_layout: list
    categories:
      title: Categories
      labels:
        en: Categories
        es: Categorías
      term_layout: list
plugins:
  enabled:
    - readingtime
    - relatedposts
    - toc
seo:
  enabled: true
  default_title_sep: "-"
cache:
  enabled: true
security:
  allow_unsafe_html: false
feed:
  rss_path: "/rss.xml"
  sitemap_path: "/sitemap.xml"
  rss_limit: 50
  rss_title: "Foundry CMS"
  rss_description: "Latest posts from Foundry CMS"
deploy:
  default_target: ""
  targets: {}
params:
  company_name: "Sphire"
menus:
  main:
    - name: "Home"
      url: "/"
    - name: "About"
      url: "/about"
    - name: "Posts"
      url: "/posts/hello-world/"
    - name: "Go Tag"
      url: "/tags/go/"
    - name: "Engineering"
      url: "/categories/engineering/"
    - name: "RSS"
      url: "/rss.xml"
