<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Foundry Docs</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f3ea;
      --panel: #fffaf0;
      --text: #1f2933;
      --muted: #52606d;
      --accent: #0f766e;
      --border: #d9d1c2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.10), transparent 30%),
        linear-gradient(180deg, var(--bg), #efe8da);
      color: var(--text);
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 72px 24px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 18px 40px rgba(31, 41, 51, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.05;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    a {
      color: var(--accent);
      font-weight: 700;
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.18em;
    }

    ul {
      margin: 24px 0 0;
      padding-left: 20px;
    }

    li + li {
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <h1>Foundry Pages</h1>
      <p>This site publishes project documentation and the latest Go test coverage report generated from the <code>main</code> branch.</p>
      <ul>
        <li><a href="./coverage/">Coverage Report</a></li>
        <li><a href="./cli-contract.md">CLI Contract</a></li>
      </ul>
    </section>
  </main>
</body>
</html>
