### Do a search-replace for "yourdomain.com" and replace it with your domain

user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 15;
    types_hash_max_size 2048;
    server_tokens off;
    gzip on;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    limit_req_zone $binary_remote_addr zone=perip:10m rate=15r/s;
    limit_req_zone $binary_remote_addr zone=admin_perip:10m rate=10r/m;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream cms_backend {
        server 127.0.0.1:8080;
        keepalive 32;
    }

    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }

    # Catch-all HTTPS block - enable later after certs exist
    #
    # server {
    #     listen 443 ssl default_server;
    #     # If your nginx build supports it, you can later use:
    #     # listen 443 ssl http2 default_server;
    #     server_name _;
    #
    #     ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    #
    #     return 444;
    # }

    server {
        listen 80;
        server_name yourdomain.com www.yourdomain.com;

        limit_req zone=perip burst=30 nodelay;

        access_log /var/log/nginx/yourdomain.com.access.log main;
        error_log  /var/log/nginx/yourdomain.com.error.log warn;

        client_max_body_size 50m;
        client_body_timeout 15s;
        client_header_timeout 15s;
        send_timeout 30s;
        keepalive_timeout 15s;

        # Allow ACME challenge path for certbot/webroot later
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/html;
            default_type "text/plain";
            allow all;
            try_files $uri =404;
        }

        # Block other hidden files, but do not block .well-known entirely
        location ~ /\.(?!well-known/) {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~* \.(env|ini|log|sh|sql|bak|old|swp|dist)$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ^~ /__admin {
            limit_req zone=admin_perip burst=10 nodelay;

            # Optional extra protection later:
            # auth_basic "Restricted Admin";
            # auth_basic_user_file /etc/nginx/.htpasswd;

            # Optional IP allowlist later:
            # allow 203.0.113.10;
            # deny all;

            proxy_pass http://cms_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Request-Id $request_id;

            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            proxy_buffering on;
            proxy_request_buffering on;
            proxy_redirect off;
        }

        location / {
            proxy_pass http://cms_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Request-Id $request_id;

            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            proxy_buffering on;
            proxy_request_buffering on;
            proxy_redirect off;

            # Foundry doesn't use websockets by default.
            # Uncomment if needed later:
            # proxy_set_header Upgrade $http_upgrade;
            # proxy_set_header Connection $connection_upgrade;
        }
    }

    # Main HTTPS site block - enable later after certs exist
    #
